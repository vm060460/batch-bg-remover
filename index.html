<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BatchCut — 批次去背工具</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ink: #0e0e12;
  --ink2: #1a1a22;
  --ink3: #252530;
  --line: #2e2e3e;
  --lime: #c8ff00;
  --lime2: #a8d800;
  --cyan: #00e5c8;
  --red: #ff3d5a;
  --text: #d8d8e8;
  --muted: #5a5a72;
  --dim: #3a3a4e;
}

html { scroll-behavior: smooth; }

body {
  background: var(--ink);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  font-size: 14px;
  line-height: 1.5;
}

/* ── noise overlay ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  opacity: .025;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 999;
}

/* ── layout ── */
.shell {
  display: grid;
  grid-template-columns: 260px 1fr;
  min-height: 100vh;
}

/* ── sidebar ── */
aside {
  background: var(--ink2);
  border-right: 1px solid var(--line);
  padding: 28px 20px;
  display: flex;
  flex-direction: column;
  gap: 28px;
  position: sticky;
  top: 0;
  height: 100vh;
  overflow-y: auto;
}

.logo {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.logo-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 32px;
  letter-spacing: 2px;
  color: var(--lime);
  line-height: 1;
}

.logo-sub {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  letter-spacing: .12em;
  text-transform: uppercase;
}

.divider {
  height: 1px;
  background: var(--line);
}

/* mode selector */
.section-label {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  letter-spacing: .12em;
  text-transform: uppercase;
  margin-bottom: 10px;
}

.mode-grid {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.mode-card {
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 10px 14px;
  cursor: pointer;
  transition: all .18s;
  display: flex;
  align-items: center;
  gap: 10px;
  background: transparent;
  color: var(--text);
  width: 100%;
  text-align: left;
}

.mode-card:hover { border-color: var(--dim); background: var(--ink3); }

.mode-card.active {
  border-color: var(--lime);
  background: rgba(200,255,0,.06);
}

.mode-icon {
  font-size: 18px;
  flex-shrink: 0;
}

.mode-info { flex: 1; }

.mode-name {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
}

.mode-card.active .mode-name { color: var(--lime); }

.mode-desc {
  font-size: 11px;
  color: var(--muted);
  margin-top: 1px;
}

/* sliders */
.slider-group { display: flex; flex-direction: column; gap: 12px; }

.slider-item { display: flex; flex-direction: column; gap: 6px; }

.slider-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
}

.slider-name {
  font-size: 12px;
  font-weight: 500;
  color: var(--text);
}

.slider-val {
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  color: var(--lime);
}

input[type=range] {
  -webkit-appearance: none;
  width: 100%;
  height: 3px;
  background: var(--line);
  border-radius: 2px;
  outline: none;
  cursor: pointer;
}

input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px;
  height: 14px;
  background: var(--lime);
  border-radius: 50%;
  cursor: pointer;
  transition: transform .15s;
}

input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.25); }

/* action btns */
.sidebar-actions { margin-top: auto; display: flex; flex-direction: column; gap: 8px; }

.btn {
  padding: 12px 20px;
  border: none;
  border-radius: 6px;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all .18s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  letter-spacing: .02em;
}

.btn-run {
  background: var(--lime);
  color: #0e0e12;
}

.btn-run:hover:not(:disabled) { background: var(--lime2); transform: translateY(-1px); }
.btn-run:active { transform: translateY(0); }
.btn-run:disabled { background: var(--dim); color: var(--muted); cursor: not-allowed; }

.btn-outline {
  background: transparent;
  border: 1px solid var(--line);
  color: var(--muted);
}

.btn-outline:hover { border-color: var(--text); color: var(--text); }

.btn-dl {
  background: var(--cyan);
  color: #0e0e12;
  display: none;
}

.btn-dl.show { display: flex; }
.btn-dl:hover { opacity: .88; transform: translateY(-1px); }

/* ── main area ── */
main {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

/* drop zone */
.drop-area {
  border: 2px dashed var(--line);
  margin: 24px;
  border-radius: 12px;
  padding: 52px 24px;
  text-align: center;
  cursor: pointer;
  transition: all .22s;
  background: var(--ink2);
  position: relative;
  overflow: hidden;
  flex-shrink: 0;
}

.drop-area::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 50% 100%, rgba(200,255,0,.05) 0%, transparent 70%);
  opacity: 0;
  transition: opacity .3s;
}

.drop-area:hover, .drop-area.over {
  border-color: var(--lime);
  background: rgba(200,255,0,.03);
}

.drop-area:hover::before, .drop-area.over::before { opacity: 1; }

.drop-icon-wrap {
  width: 64px;
  height: 64px;
  margin: 0 auto 16px;
  border: 1px solid var(--line);
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  background: var(--ink3);
  transition: all .22s;
  position: relative;
}

.drop-area:hover .drop-icon-wrap, .drop-area.over .drop-icon-wrap {
  border-color: var(--lime);
  box-shadow: 0 0 24px rgba(200,255,0,.15);
}

.drop-title {
  font-size: 17px;
  font-weight: 600;
  margin-bottom: 6px;
}

.drop-hint {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--muted);
}

.drop-hint em {
  color: var(--lime);
  font-style: normal;
  cursor: pointer;
  text-decoration: underline;
  text-underline-offset: 3px;
}

#fileInput { display: none; }

/* progress */
.progress-bar-wrap {
  height: 3px;
  background: var(--line);
  margin: 0 24px;
  border-radius: 2px;
  overflow: hidden;
  display: none;
  flex-shrink: 0;
}

.progress-bar-wrap.show { display: block; }

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--lime), var(--cyan));
  width: 0%;
  transition: width .25s ease;
  border-radius: 2px;
}

/* status row */
.status-row {
  padding: 10px 28px;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  min-height: 34px;
  display: flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
}

.status-row.ok { color: var(--lime); }
.status-row.err { color: var(--red); }

.status-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: currentColor;
  flex-shrink: 0;
}

/* grid */
.grid-header {
  padding: 4px 24px 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-shrink: 0;
}

.grid-count {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--muted);
}

.grid-count strong { color: var(--lime); }

.clear-link {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  cursor: pointer;
  text-decoration: underline;
  text-underline-offset: 3px;
  background: none;
  border: none;
}

.clear-link:hover { color: var(--red); }

.img-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(148px, 1fr));
  gap: 10px;
  padding: 0 24px 32px;
  overflow-y: auto;
  flex: 1;
}

/* card */
.img-card {
  background: var(--ink2);
  border: 1px solid var(--line);
  border-radius: 8px;
  overflow: hidden;
  position: relative;
  transition: border-color .18s;
}

.img-card[data-status="processing"] { border-color: var(--cyan); }
.img-card[data-status="done"] { border-color: var(--lime); }
.img-card[data-status="error"] { border-color: var(--red); }

.card-thumb-wrap {
  aspect-ratio: 1;
  background:
    repeating-conic-gradient(var(--ink3) 0% 25%, var(--ink2) 0% 50%)
    0 0 / 18px 18px;
  overflow: hidden;
  cursor: pointer;
}

.card-thumb {
  width: 100%;
  height: 100%;
  object-fit: contain;
  display: block;
  transition: opacity .2s;
}

.card-thumb:hover { opacity: .85; }

.card-footer {
  padding: 6px 8px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.card-name {
  flex: 1;
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.card-badge {
  width: 18px;
  height: 18px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 9px;
  flex-shrink: 0;
}

.card-badge.processing {
  background: rgba(0,229,200,.15);
  color: var(--cyan);
  animation: spin .8s linear infinite;
}

.card-badge.done {
  background: rgba(200,255,0,.15);
  color: var(--lime);
}

.card-badge.error {
  background: rgba(255,61,90,.15);
  color: var(--red);
}

@keyframes spin { to { transform: rotate(360deg); } }

/* dl single btn on card */
.card-dl {
  position: absolute;
  top: 6px;
  right: 6px;
  background: rgba(200,255,0,.85);
  color: #0e0e12;
  border: none;
  border-radius: 4px;
  font-size: 10px;
  font-weight: 700;
  padding: 3px 7px;
  cursor: pointer;
  display: none;
  font-family: 'DM Mono', monospace;
  transition: all .15s;
}

.card-dl:hover { background: var(--lime); transform: scale(1.05); }
.img-card[data-status="done"] .card-dl { display: block; }

/* empty state */
.empty-state {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  color: var(--muted);
  padding-bottom: 60px;
  font-family: 'DM Mono', monospace;
  font-size: 12px;
}

.empty-icon { font-size: 36px; opacity: .3; }

/* preview overlay */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(8,8,12,.9);
  backdrop-filter: blur(12px);
  z-index: 200;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 24px;
}

.overlay.open { display: flex; }

.preview-modal {
  background: var(--ink2);
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: 20px;
  max-width: 700px;
  width: 100%;
  max-height: 90vh;
  overflow-y: auto;
}

.preview-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
}

.preview-title {
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  color: var(--muted);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  max-width: 85%;
}

.preview-close {
  background: none;
  border: none;
  color: var(--muted);
  font-size: 20px;
  cursor: pointer;
  flex-shrink: 0;
  line-height: 1;
}

.preview-close:hover { color: var(--text); }

.preview-pair {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.preview-cell {}

.preview-cell-label {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: .1em;
  margin-bottom: 6px;
}

.preview-cell-img {
  border-radius: 6px;
  overflow: hidden;
  border: 1px solid var(--line);
  background:
    repeating-conic-gradient(#252530 0% 25%, #1a1a22 0% 50%)
    0 0 / 16px 16px;
}

.preview-cell-img img {
  width: 100%;
  display: block;
  border-radius: 6px;
}

/* scrollbars */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--line); border-radius: 3px; }

/* responsive */
@media (max-width: 680px) {
  .shell { grid-template-columns: 1fr; }
  aside {
    position: relative;
    height: auto;
    border-right: none;
    border-bottom: 1px solid var(--line);
  }
  .sidebar-actions { flex-direction: row; flex-wrap: wrap; }
  .img-grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); }
}
</style>
</head>
<body>

<div class="shell">

  <!-- ── SIDEBAR ── -->
  <aside>
    <div class="logo">
      <div class="logo-title">BatchCut</div>
      <div class="logo-sub">批次去背工具 · 100% 本地端</div>
    </div>

    <div class="divider"></div>

    <div>
      <div class="section-label">去背模式</div>
      <div class="mode-grid">
        <button class="mode-card active" onclick="setMode('white', this)">
          <span class="mode-icon">⬜</span>
          <div class="mode-info">
            <div class="mode-name">白色背景</div>
            <div class="mode-desc">White / Light Background</div>
          </div>
        </button>
        <button class="mode-card" onclick="setMode('green', this)">
          <span class="mode-icon">🟩</span>
          <div class="mode-info">
            <div class="mode-name">綠幕 Chroma</div>
            <div class="mode-desc">Green Screen Removal</div>
          </div>
        </button>
        <button class="mode-card" onclick="setMode('both', this)">
          <span class="mode-icon">✦</span>
          <div class="mode-info">
            <div class="mode-name">白底 ＋ 綠幕</div>
            <div class="mode-desc">Remove Both</div>
          </div>
        </button>
      </div>
    </div>

    <div class="divider"></div>

    <div>
      <div class="section-label">參數設定</div>
      <div class="slider-group">
        <div class="slider-item">
          <div class="slider-header">
            <span class="slider-name">容差 Tolerance</span>
            <span class="slider-val" id="tolVal">35</span>
          </div>
          <input type="range" id="slTol" min="5" max="120" value="35"
            oninput="document.getElementById('tolVal').textContent=this.value">
        </div>
        <div class="slider-item">
          <div class="slider-header">
            <span class="slider-name">縮邊 Shrink</span>
            <span class="slider-val" id="shrinkVal">1</span>
          </div>
          <input type="range" id="slShrink" min="0" max="8" value="1"
            oninput="document.getElementById('shrinkVal').textContent=this.value">
        </div>
        <div class="slider-item">
          <div class="slider-header">
            <span class="slider-name">羽化 Feather</span>
            <span class="slider-val" id="featherVal">1</span>
          </div>
          <input type="range" id="slFeather" min="0" max="8" value="1"
            oninput="document.getElementById('featherVal').textContent=this.value">
        </div>
      </div>
    </div>

    <div class="divider"></div>

    <div class="sidebar-actions">
      <button class="btn btn-run" id="runBtn" onclick="runAll()" disabled>
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <polygon points="3,1 13,7 3,13" fill="currentColor"/>
        </svg>
        開始去背
      </button>
      <button class="btn btn-dl" id="dlAllBtn" onclick="downloadAll()">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M7 1v8M4 7l3 3 3-3M2 12h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        下載全部 ZIP
      </button>
      <button class="btn btn-outline" onclick="clearAll()">清除</button>
    </div>
  </aside>

  <!-- ── MAIN ── -->
  <main>
    <!-- drop zone -->
    <div class="drop-area" id="dropArea"
      ondragover="ev(event,'over')" ondragleave="ev(event,'leave')" ondrop="ev(event,'drop')"
      onclick="document.getElementById('fileInput').click()">
      <div class="drop-icon-wrap">📁</div>
      <div class="drop-title">拖曳圖片到這裡</div>
      <div class="drop-hint">支援 JPG · PNG · WEBP · BMP &nbsp;｜&nbsp; <em>點擊瀏覽</em> 或直接拖放多張</div>
    </div>
    <input type="file" id="fileInput" multiple accept="image/*" onchange="addFiles(this.files)">

    <!-- progress -->
    <div class="progress-bar-wrap" id="progWrap">
      <div class="progress-fill" id="progFill"></div>
    </div>

    <!-- status -->
    <div class="status-row" id="statusRow"></div>

    <!-- grid or empty -->
    <div id="emptyState" class="empty-state">
      <div class="empty-icon">🖼</div>
      <span>尚未加入任何圖片</span>
    </div>

    <div id="gridHeader" class="grid-header" style="display:none">
      <div class="grid-count">共 <strong id="totalCount">0</strong> 張</div>
      <button class="clear-link" onclick="clearAll()">清除全部</button>
    </div>

    <div class="img-grid" id="imgGrid"></div>
  </main>
</div>

<!-- preview overlay -->
<div class="overlay" id="overlay" onclick="closePreview(event)">
  <div class="preview-modal">
    <div class="preview-header">
      <div class="preview-title" id="prevTitle"></div>
      <button class="preview-close" onclick="closePreview()">✕</button>
    </div>
    <div class="preview-pair">
      <div class="preview-cell">
        <div class="preview-cell-label">原圖</div>
        <div class="preview-cell-img"><img id="prevOrig" src="" alt="original"></div>
      </div>
      <div class="preview-cell">
        <div class="preview-cell-label">去背結果</div>
        <div class="preview-cell-img"><img id="prevResult" src="" alt="result"></div>
      </div>
    </div>
  </div>
</div>

<canvas id="wc" style="display:none"></canvas>

<script>
// ─── State ───────────────────────────────────────────
let mode = 'white';
let items = []; // {file, origUrl, blob, status}
let busy = false;

// ─── Mode ─────────────────────────────────────────────
function setMode(m, el) {
  mode = m;
  document.querySelectorAll('.mode-card').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
}

// ─── Drag & drop ──────────────────────────────────────
function ev(e, type) {
  e.preventDefault();
  const da = document.getElementById('dropArea');
  if (type === 'over') da.classList.add('over');
  else if (type === 'leave') da.classList.remove('over');
  else if (type === 'drop') {
    da.classList.remove('over');
    addFiles(e.dataTransfer.files);
  }
}

// ─── Add files ────────────────────────────────────────
function addFiles(files) {
  let added = 0;
  for (const f of files) {
    if (!f.type.startsWith('image/')) continue;
    items.push({ file: f, origUrl: URL.createObjectURL(f), blob: null, status: 'pending' });
    added++;
  }
  if (added) render();
}

// ─── Render grid ──────────────────────────────────────
function render() {
  const grid = document.getElementById('imgGrid');
  const empty = document.getElementById('emptyState');
  const header = document.getElementById('gridHeader');
  const runBtn = document.getElementById('runBtn');

  if (!items.length) {
    empty.style.display = 'flex';
    header.style.display = 'none';
    grid.innerHTML = '';
    runBtn.disabled = true;
    return;
  }

  empty.style.display = 'none';
  header.style.display = 'flex';
  runBtn.disabled = busy;
  document.getElementById('totalCount').textContent = items.length;

  grid.innerHTML = '';
  items.forEach((it, i) => {
    const card = document.createElement('div');
    card.className = 'img-card';
    card.dataset.status = it.status;

    // thumb
    const twrap = document.createElement('div');
    twrap.className = 'card-thumb-wrap';
    twrap.title = it.status === 'done' ? '點擊預覽對比' : it.file.name;
    if (it.status === 'done') twrap.onclick = () => openPreview(i);

    const thumb = document.createElement('img');
    thumb.className = 'card-thumb';
    thumb.src = it.blob ? URL.createObjectURL(it.blob) : it.origUrl;
    thumb.alt = it.file.name;

    twrap.appendChild(thumb);
    card.appendChild(twrap);

    // dl btn
    if (it.status === 'done') {
      const dl = document.createElement('button');
      dl.className = 'card-dl';
      dl.textContent = '↓';
      dl.title = '下載此圖';
      dl.onclick = (e) => { e.stopPropagation(); dlSingle(it); };
      card.appendChild(dl);
    }

    // footer
    const footer = document.createElement('div');
    footer.className = 'card-footer';

    const name = document.createElement('div');
    name.className = 'card-name';
    name.textContent = it.file.name;
    footer.appendChild(name);

    if (it.status !== 'pending') {
      const badge = document.createElement('div');
      badge.className = `card-badge ${it.status}`;
      badge.textContent = it.status === 'processing' ? '⟳'
        : it.status === 'done' ? '✓' : '✕';
      footer.appendChild(badge);
    }

    card.appendChild(footer);
    grid.appendChild(card);
  });
}

// ─── Core: remove bg ─────────────────────────────────
async function removeBg(origUrl) {
  const tol     = parseInt(document.getElementById('slTol').value);
  const shrink  = parseInt(document.getElementById('slShrink').value);
  const feather = parseInt(document.getElementById('slFeather').value);

  return new Promise((res, rej) => {
    const img = new Image();
    img.onload = () => {
      const cv  = document.getElementById('wc');
      cv.width  = img.width;
      cv.height = img.height;
      const ctx = cv.getContext('2d', { willReadFrequently: true });
      ctx.drawImage(img, 0, 0);

      const W = cv.width, H = cv.height, N = W * H;
      const id = ctx.getImageData(0, 0, W, H);
      const d  = id.data;

      // ── Step 1: per-pixel colour match ──────────────────
      // isBg[p] = 1 if pixel colour matches background colour
      const isBg = new Uint8Array(N);
      for (let i = 0; i < d.length; i += 4) {
        const r = d[i], g = d[i+1], b = d[i+2];
        let bg = false;

        if (mode === 'white' || mode === 'both') {
          const bright = (r + g + b) / 3;
          const maxC   = Math.max(r, g, b);
          const minC   = Math.min(r, g, b);
          const sat    = maxC === 0 ? 0 : (maxC - minC) / maxC * 255;
          if (bright >= 255 - tol && sat <= tol * 0.65) bg = true;
        }

        if (!bg && (mode === 'green' || mode === 'both')) {
          const dom = g - Math.max(r, b);
          if (dom > (42 - tol * 0.28) && g > 50 && r < 210 && b < 210) bg = true;
        }

        isBg[i >> 2] = bg ? 1 : 0;
      }

      // ── Step 2: flood-fill from ALL four edges ───────────
      // Finds the outer background (connected to border).
      // Uses iterative flood with a typed-array stack for speed.
      const outerBg = new Uint8Array(N); // 1 = confirmed outer background
      const stack   = new Int32Array(N);
      let   top     = 0;

      function seedEdge(p) {
        if (isBg[p] && !outerBg[p]) { outerBg[p] = 1; stack[top++] = p; }
      }
      for (let x = 0; x < W; x++) { seedEdge(x); seedEdge((H-1)*W + x); }
      for (let y = 0; y < H; y++) { seedEdge(y*W); seedEdge(y*W + W-1); }

      while (top > 0) {
        const p = stack[--top];
        const x = p % W, y = (p / W) | 0;
        if (x > 0   && isBg[p-1]   && !outerBg[p-1])   { outerBg[p-1]   = 1; stack[top++] = p-1; }
        if (x < W-1 && isBg[p+1]   && !outerBg[p+1])   { outerBg[p+1]   = 1; stack[top++] = p+1; }
        if (y > 0   && isBg[p-W]   && !outerBg[p-W])   { outerBg[p-W]   = 1; stack[top++] = p-W; }
        if (y < H-1 && isBg[p+W]   && !outerBg[p+W])   { outerBg[p+W]   = 1; stack[top++] = p+W; }
      }

      // ── Step 3: detect interior holes ───────────────────
      // Strategy: dilate the FOREGROUND outward by a few px.
      // Any bg pixel that the dilated foreground fully surrounds
      // is an interior hole (e.g. inside a mug).
      //
      // Implementation: flood-fill from edges on a map where
      // fg pixels act as walls.  Pixels NOT reached = interior holes.
      //
      // We use isBg as the "passable" map (only bg pixels can be reached),
      // but we block passages that run through foreground pixels.
      // Then bg pixels still not reached after the edge-flood are holes.

      // A pixel is "reachable from outside" if it can be reached via
      // bg-only paths from the image border → already computed as outerBg.
      // So interior hole = isBg[p] && !outerBg[p].

      // ── Step 4: build final removal mask ────────────────
      // Remove = outerBg OR interior hole
      const remove = new Uint8Array(N);
      for (let p = 0; p < N; p++) {
        // outer background
        if (outerBg[p]) { remove[p] = 1; continue; }
        // interior hole: colour matches bg but NOT reachable from outside
        if (isBg[p])    { remove[p] = 1; }
      }

      // ── Step 5: shrink foreground edges ─────────────────
      if (shrink > 0) {
        const copy = new Uint8Array(remove);
        for (let y = 0; y < H; y++) {
          for (let x = 0; x < W; x++) {
            const p = y * W + x;
            if (copy[p] === 0) { // foreground pixel
              let nearBg = false;
              outer: for (let dy = -shrink; dy <= shrink; dy++) {
                for (let dx = -shrink; dx <= shrink; dx++) {
                  const nx = x+dx, ny = y+dy;
                  if (nx >= 0 && nx < W && ny >= 0 && ny < H && copy[ny*W+nx] === 1) {
                    nearBg = true; break outer;
                  }
                }
              }
              if (nearBg) remove[p] = 1;
            }
          }
        }
      }

      // ── Step 6: apply alpha + feather ───────────────────
      for (let i = 0; i < d.length; i += 4) {
        const p = i >> 2;
        if (remove[p]) {
          d[i+3] = 0;
        } else if (feather > 0) {
          const x = p % W, y = (p / W) | 0;
          let minDist = feather + 1;
          for (let dy = -feather; dy <= feather; dy++) {
            for (let dx = -feather; dx <= feather; dx++) {
              const nx = x+dx, ny = y+dy;
              if (nx >= 0 && nx < W && ny >= 0 && ny < H) {
                if (remove[ny*W+nx]) {
                  const dist = Math.sqrt(dx*dx + dy*dy);
                  if (dist < minDist) minDist = dist;
                }
              }
            }
          }
          if (minDist <= feather) d[i+3] = Math.round((minDist / feather) * 255);
        }
      }

      ctx.putImageData(id, 0, 0);
      cv.toBlob(blob => res(blob), 'image/png');
    };
    img.onerror = rej;
    img.src = origUrl;
  });
}

// ─── Run all ─────────────────────────────────────────
async function runAll() {
  if (busy || !items.length) return;
  busy = true;
  const runBtn = document.getElementById('runBtn');
  runBtn.disabled = true;
  runBtn.textContent = '處理中…';
  document.getElementById('progWrap').classList.add('show');
  document.getElementById('dlAllBtn').classList.remove('show');

  let ok = 0, fail = 0;
  for (let i = 0; i < items.length; i++) {
    items[i].status = 'processing';
    render();
    setStatus(`處理中 ${i+1} / ${items.length}：${items[i].file.name}`);
    setProgress((i / items.length) * 100);

    try {
      items[i].blob = await removeBg(items[i].origUrl);
      items[i].status = 'done';
      ok++;
    } catch(e) {
      items[i].status = 'error';
      fail++;
      console.error(e);
    }

    setProgress(((i+1) / items.length) * 100);
    render();
    await tick();
  }

  busy = false;
  runBtn.disabled = false;
  runBtn.innerHTML = `<svg width="14" height="14" viewBox="0 0 14 14"><polygon points="3,1 13,7 3,13" fill="currentColor"/></svg> 重新處理`;

  if (ok > 0) document.getElementById('dlAllBtn').classList.add('show');

  const cls = fail ? 'err' : 'ok';
  setStatus(fail
    ? `完成：${ok} 成功 / ${fail} 失敗`
    : `✓ 全部完成，共 ${ok} 張圖片去背成功`, cls);
}

// ─── Download ─────────────────────────────────────────
function dlSingle(it) {
  const name = it.file.name.replace(/\.[^.]+$/, '') + '.png';
  const url = URL.createObjectURL(it.blob);
  const a = document.createElement('a');
  a.href = url; a.download = name; a.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

async function downloadAll() {
  const done = items.filter(it => it.blob);
  if (!done.length) return;

  if (done.length === 1) { dlSingle(done[0]); return; }

  try {
    await loadScript('https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js');
    const zip = new JSZip();
    done.forEach(it => {
      const name = it.file.name.replace(/\.[^.]+$/, '') + '.png';
      zip.file(name, it.blob);
    });
    const zblob = await zip.generateAsync({ type: 'blob' });
    const url = URL.createObjectURL(zblob);
    const a = document.createElement('a');
    a.href = url; a.download = 'batchcut_results.zip'; a.click();
    setTimeout(() => URL.revokeObjectURL(url), 2000);
  } catch {
    // fallback: download one by one
    for (const it of done) {
      dlSingle(it);
      await new Promise(r => setTimeout(r, 400));
    }
  }
}

function loadScript(src) {
  return new Promise((res, rej) => {
    if (document.querySelector(`script[src="${src}"]`)) { res(); return; }
    const s = document.createElement('script');
    s.src = src; s.onload = res; s.onerror = rej;
    document.head.appendChild(s);
  });
}

// ─── Preview ──────────────────────────────────────────
function openPreview(i) {
  const it = items[i];
  document.getElementById('prevTitle').textContent = it.file.name;
  document.getElementById('prevOrig').src = it.origUrl;
  document.getElementById('prevResult').src = URL.createObjectURL(it.blob);
  document.getElementById('overlay').classList.add('open');
}

function closePreview(e) {
  if (!e || e.target === document.getElementById('overlay')) {
    document.getElementById('overlay').classList.remove('open');
  }
}

// ─── Clear ────────────────────────────────────────────
function clearAll() {
  items = [];
  document.getElementById('progWrap').classList.remove('show');
  document.getElementById('dlAllBtn').classList.remove('show');
  document.getElementById('runBtn').innerHTML =
    `<svg width="14" height="14" viewBox="0 0 14 14"><polygon points="3,1 13,7 3,13" fill="currentColor"/></svg> 開始去背`;
  setStatus('');
  setProgress(0);
  render();
}

// ─── Helpers ──────────────────────────────────────────
function setStatus(msg, cls = '') {
  const el = document.getElementById('statusRow');
  el.className = 'status-row' + (cls ? ' ' + cls : '');
  el.innerHTML = msg
    ? `<div class="status-dot"></div>${msg}`
    : '';
}

function setProgress(pct) {
  document.getElementById('progFill').style.width = pct + '%';
}

function tick() { return new Promise(r => setTimeout(r, 8)); }
</script>
