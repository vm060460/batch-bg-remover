<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>單色背景大量去背工具</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Serif+TC:wght@700;900&family=DM+Sans:wght@400;500;600;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* ──────── THEME ──────── */
:root{
  --bg:#f0f2f5;--bg2:#fff;--bg3:#e8eaed;--bg4:#dde0e7;
  --bdr:#cdd1da;--bdr2:#adb3bf;
  --acc:#2d8a00;--acc2:#1f6600;--acc-a:rgba(45,138,0,.1);
  --acc-t:#fff;
  --cyan:#0088aa;--ora:#b85000;--red:#bb1122;
  --txt:#1a1c1f;--mut:#6b7280;--dim:#9ca3af;
  --card:#fff;--cbdr:#d8dce6;
  --sh:0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.05);
  --sh2:0 2px 12px rgba(0,0,0,.14);
  --prog-bg:#e0e3e8;
}
[data-theme=dark]{
  --bg:#0c0c12;--bg2:#151520;--bg3:#1e1e2c;--bg4:#252535;
  --bdr:#28283c;--bdr2:#343450;
  --acc:#b8f000;--acc2:#96c800;--acc-a:rgba(184,240,0,.09);
  --acc-t:#0c0c12;
  --cyan:#00dfc8;--ora:#ff8c00;--red:#ff3a58;
  --txt:#d0d0e8;--mut:#52526e;--dim:#2e2e44;
  --card:#151520;--cbdr:#28283c;
  --sh:none;--sh2:none;
  --prog-bg:#28283c;
}

html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--txt);font-family:'DM Sans',sans-serif;font-size:13px;line-height:1.5;transition:background .22s,color .22s}

/* ──────── GLOBAL DROP ──────── */
#gDrop{position:fixed;inset:0;z-index:9999;pointer-events:none;display:flex;align-items:center;justify-content:center;background:rgba(45,138,0,.06);border:3px dashed var(--acc);opacity:0;transition:opacity .18s}
[data-theme=dark] #gDrop{background:rgba(184,240,0,.06)}
#gDrop.show{opacity:1}
.gd-box{text-align:center}
.gd-ico{font-size:64px;margin-bottom:12px}
.gd-txt{font-size:22px;font-weight:700;color:var(--acc)}

/* ──────── LAYOUT ──────── */
.app{display:flex;height:100vh;overflow:hidden}

/* ──────── SIDEBAR ──────── */
.sb{width:272px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--bdr);display:flex;flex-direction:column;height:100vh;overflow:hidden;box-shadow:var(--sh)}
.sb-brand{padding:14px 16px 11px;border-bottom:1px solid var(--bdr);flex-shrink:0}
.sb-title{font-family:'Noto Serif TC',serif;font-size:14.5px;font-weight:900;color:var(--txt);line-height:1.4}
.sb-title em{color:var(--acc);font-style:normal}
.sb-author{font-family:'DM Mono',monospace;font-size:9px;color:var(--mut);margin-top:3px}
.sb-panels{flex:1;overflow-y:auto;padding:8px 11px 4px;scrollbar-width:thin}
.sb-panels::-webkit-scrollbar{width:3px}
.sb-panels::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:2px}
.sb-footer{padding:9px 11px 11px;border-top:1px solid var(--bdr);flex-shrink:0;display:flex;flex-direction:column;gap:5px}

/* ──────── COLLAPSIBLE PANEL ──────── */
.pnl{margin-bottom:5px}
.pnl-hd{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;border:1px solid var(--bdr);border-radius:7px;cursor:pointer;background:var(--bg3);transition:all .13s;user-select:none;gap:6px}
.pnl-hd:hover{border-color:var(--bdr2);background:var(--bg4)}
.pnl-hd.o{border-bottom-left-radius:0;border-bottom-right-radius:0;border-color:var(--bdr2)}
.pnl-ttl{font-size:11.5px;font-weight:600;color:var(--txt);flex:1}
.pnl-arr{font-size:9px;color:var(--mut);transition:transform .18s;flex-shrink:0}
.pnl-hd.o .pnl-arr{transform:rotate(180deg)}
.pnl-bd{border:1px solid var(--bdr2);border-top:none;border-radius:0 0 7px 7px;padding:10px 11px;background:var(--bg3);display:none}
.pnl-bd.o{display:block}

/* ──────── MODES ──────── */
.m-list{display:flex;flex-direction:column;gap:3px}
.mc{border:1px solid var(--bdr);border-radius:6px;padding:7px 10px;cursor:pointer;transition:all .12s;display:flex;align-items:center;gap:8px;background:transparent;color:var(--txt);width:100%;text-align:left}
.mc:hover{border-color:var(--bdr2);background:var(--bg4)}
.mc.on{border-color:var(--acc);background:var(--acc-a)}
.mc-ico{font-size:14px;flex-shrink:0;width:18px;text-align:center}
.mc-name{font-size:11.5px;font-weight:600}.mc.on .mc-name{color:var(--acc)}
.mc-desc{font-size:9px;color:var(--mut);margin-top:1px}
.more-btn{width:100%;padding:5px 9px;background:transparent;border:1px dashed var(--bdr2);border-radius:6px;color:var(--mut);font-size:11px;cursor:pointer;transition:all .12s;font-family:'DM Sans',sans-serif;margin-top:3px}
.more-btn:hover{border-color:var(--bdr);color:var(--txt)}
.xtra{display:none;flex-direction:column;gap:3px;margin-top:3px}
.xtra.on{display:flex}
.cc-row{display:none;align-items:center;gap:7px;margin-top:6px;background:var(--bg4);border:1px solid var(--bdr);border-radius:6px;padding:6px 9px}
.cc-row.on{display:flex}
.cc-row label{font-size:10px;color:var(--mut);flex-shrink:0}
#cpick{width:28px;height:24px;border:none;border-radius:3px;cursor:pointer;background:transparent;padding:0}
#chex{flex:1;background:var(--bg2);border:1px solid var(--bdr);border-radius:4px;color:var(--txt);font-family:'DM Mono',monospace;font-size:10px;padding:3px 6px;outline:none}
#chex:focus{border-color:var(--acc)}

/* ──────── CONTROLS ──────── */
.slabel{font-family:'DM Mono',monospace;font-size:9px;color:var(--mut);letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px}
.pdiv{height:1px;background:var(--bdr);margin:7px 0}
.chk-list{display:flex;flex-direction:column;gap:6px}
.chk-row{display:flex;align-items:flex-start;gap:7px;cursor:pointer}
.chk-row input[type=checkbox]{width:13px;height:13px;flex-shrink:0;margin-top:2px;accent-color:var(--acc);cursor:pointer}
.chk-lbl{font-size:11.5px;color:var(--txt);line-height:1.4}
.chk-sub{font-size:9px;color:var(--mut);margin-top:1px}
.sub-row{display:none;margin-top:6px;padding:7px 9px;background:var(--bg4);border:1px solid var(--bdr);border-radius:6px}
.sub-row.on{display:block}
.sl-list{display:flex;flex-direction:column;gap:9px}
.sl-it{display:flex;flex-direction:column;gap:4px}
.sl-hd{display:flex;justify-content:space-between;align-items:baseline}
.sl-nm{font-size:11px;font-weight:500}
.sl-vl{font-family:'DM Mono',monospace;font-size:11px;color:var(--acc)}
input[type=range]{-webkit-appearance:none;width:100%;height:3px;background:var(--bdr);border-radius:2px;outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;background:var(--acc);border-radius:50%;cursor:pointer;transition:transform .12s}
input[type=range]::-webkit-slider-thumb:hover{transform:scale(1.3)}
.cr-opts{display:flex;flex-direction:column;gap:3px}
.cr-opt{display:flex;align-items:center;gap:7px;cursor:pointer;border:1px solid var(--bdr);border-radius:5px;padding:6px 9px;transition:all .12s}
.cr-opt:hover{border-color:var(--bdr2)}
.cr-opt input[type=radio]{accent-color:var(--acc);cursor:pointer;flex-shrink:0}
.cr-opt-lbl{font-size:11.5px}
.cr-opt.on{border-color:var(--acc);background:var(--acc-a)}
.uni-inputs{display:flex;align-items:center;gap:5px;margin-top:5px}
.uni-n{width:60px;background:var(--bg2);border:1px solid var(--bdr);border-radius:4px;color:var(--txt);font-family:'DM Mono',monospace;font-size:11px;padding:4px 5px;outline:none;text-align:center}
.uni-n:focus{border-color:var(--acc)}

/* ──────── SIDEBAR BUTTONS ──────── */
.btn{padding:11px 14px;border:none;border-radius:7px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .14s;display:flex;align-items:center;justify-content:center;gap:7px;width:100%}
.btn-go{background:var(--acc);color:var(--acc-t)}
.btn-go:hover:not(:disabled){background:var(--acc2);transform:translateY(-1px)}
.btn-go:disabled{opacity:.45;cursor:not-allowed;transform:none}
.btn-re{background:var(--bg3);color:var(--mut);border:1px solid var(--bdr)}
.btn-re:hover:not(:disabled){background:var(--bg4);color:var(--txt);border-color:var(--bdr2)}
.btn-re:disabled{opacity:.4;cursor:not-allowed}
.btn-dl{background:var(--cyan);color:#fff}
.btn-dl:hover{opacity:.86;transform:translateY(-1px)}
.btn-clr{background:transparent;border:1px solid var(--bdr);color:var(--mut)}
.btn-clr:hover{border-color:var(--red);color:var(--red)}

/* ──────── MAIN AREA ──────── */
main{flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden;min-width:0}
.top-bar{padding:9px 16px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:8px;flex-shrink:0;background:var(--bg2);box-shadow:var(--sh)}
.add-btn{display:flex;align-items:center;gap:6px;border:1px dashed var(--bdr2);border-radius:7px;padding:7px 16px;cursor:pointer;transition:all .14s;background:transparent;color:var(--mut);font-family:'DM Sans',sans-serif;font-size:12.5px;font-weight:500}
.add-btn:hover{border-color:var(--acc);color:var(--acc);background:var(--acc-a)}
#fileIn{display:none}
.top-r{margin-left:auto;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.top-stats{font-family:'DM Mono',monospace;font-size:10px;color:var(--mut);display:flex;align-items:center;gap:10px}
.top-stats strong{color:var(--acc)}
.tgl-btn{padding:5px 10px;border:1px solid var(--bdr);border-radius:6px;background:transparent;color:var(--mut);font-size:11.5px;cursor:pointer;transition:all .12s;font-family:'DM Sans',sans-serif;white-space:nowrap}
.tgl-btn:hover{border-color:var(--bdr2);color:var(--txt)}
.lang-sel{padding:5px 9px;border:1px solid var(--bdr);border-radius:6px;background:var(--bg2);color:var(--txt);font-size:11.5px;cursor:pointer;font-family:'DM Sans',sans-serif;outline:none}
.lang-sel:focus{border-color:var(--acc)}

/* ──────── PROGRESS & STATUS ──────── */
.prog-wrap{height:4px;background:var(--prog-bg);flex-shrink:0;display:none}
.prog-wrap.on{display:block}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--acc),var(--cyan));width:0%;transition:width .22s ease}
.stat-bar{padding:5px 16px;font-family:'DM Mono',monospace;font-size:10.5px;color:var(--mut);flex-shrink:0;min-height:24px;display:flex;align-items:center;gap:5px}
.stat-bar.ok{color:var(--acc)}.stat-bar.er{color:var(--red)}
.stat-dot{width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0}

/* ──────── IMAGE GRID ──────── */
.img-scroll{flex:1;overflow-y:auto;padding:12px 14px 20px;scrollbar-width:thin}
.img-scroll::-webkit-scrollbar{width:5px}
.img-scroll::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:3px}

/* empty state */
.empty{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;cursor:pointer}
.empty-ico{font-size:64px;opacity:.14;transition:opacity .2s}
.empty-ttl{font-size:18px;font-weight:600;color:var(--dim)}
.empty-sub{font-family:'DM Mono',monospace;font-size:12px;color:var(--dim)}
.empty:hover .empty-ico{opacity:.26}

.img-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px}

/* ──────── CARD ──────── */
.img-card{background:var(--card);border:1.5px solid var(--cbdr);border-radius:10px;overflow:hidden;position:relative;transition:border-color .14s,box-shadow .14s,transform .14s;box-shadow:var(--sh)}
.img-card:hover{box-shadow:var(--sh2);transform:translateY(-1px)}
.img-card[data-s=processing]{border-color:var(--cyan)}
.img-card[data-s=done]{border-color:var(--acc)}
.img-card[data-s=error]{border-color:var(--red)}

/* thumb */
.cthumb{
  aspect-ratio:1;
  background:repeating-conic-gradient(var(--bg3) 0% 25%,var(--bg2) 0% 50%) 0 0/16px 16px;
  overflow:hidden;cursor:pointer;position:relative;flex-shrink:0
}
.cthumb img{width:100%;height:100%;object-fit:contain;display:block;transition:opacity .14s}
.cthumb:hover img{opacity:.82}

/* ─── CARD ACTION BUTTONS — vertical right panel ─── */
.cactions{
  position:absolute;top:0;right:0;bottom:0;
  width:52px;
  display:none;
  flex-direction:column;gap:0;
  background:linear-gradient(to left, rgba(0,0,0,.62) 0%, transparent 100%);
  align-items:flex-end;justify-content:center;padding:6px 6px 6px 0;
  opacity:0;transition:opacity .15s
}
.img-card:hover .cactions{opacity:1}
.img-card[data-s=done] .cactions,.img-card[data-s=error] .cactions{display:flex}
.cact{
  width:42px;height:42px;
  border:none;border-radius:8px;
  cursor:pointer;transition:all .13s;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  font-family:'DM Sans',sans-serif;font-weight:700;
  box-shadow:0 2px 8px rgba(0,0,0,.3);
  margin-bottom:5px;flex-shrink:0
}
.cact:last-child{margin-bottom:0}
.cact-ico{font-size:16px;line-height:1}
.cact-lbl{font-size:8.5px;line-height:1;letter-spacing:.02em}
.cact-prev{background:rgba(255,255,255,.94);color:#222}
.cact-prev:hover{background:#fff;transform:scale(1.06)}
.cact-dl{background:rgba(0,160,80,.92);color:#fff}
.cact-dl:hover{background:#00a050;transform:scale(1.06)}
.cact-crop{background:rgba(0,160,220,.92);color:#fff}
.cact-crop:hover{background:#0090cc;transform:scale(1.06)}
.cact-retry{background:rgba(220,100,0,.92);color:#fff}
.cact-retry:hover{background:#dd6400;transform:scale(1.06)}

/* card info */
.cinfo{padding:8px 10px 7px}
.cname{font-family:'DM Mono',monospace;font-size:10px;color:var(--mut);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px}
.csize-orig{font-family:'DM Mono',monospace;font-size:9.5px;color:var(--mut)}
.csize-out{font-family:'DM Mono',monospace;font-size:9.5px;color:var(--acc);margin-top:1px}
.cfilesize{font-family:'DM Mono',monospace;font-size:9px;color:var(--dim);margin-top:2px}
.cbadge-row{display:flex;align-items:center;justify-content:space-between;margin-top:4px}
.cbadge{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;flex-shrink:0}
.cbadge.processing{background:rgba(0,136,170,.14);color:var(--cyan);animation:spin .8s linear infinite}
.cbadge.done{background:rgba(45,138,0,.14);color:var(--acc)}
.cbadge.error{background:rgba(187,17,34,.14);color:var(--red)}
[data-theme=dark] .cbadge.processing{background:rgba(0,223,200,.15);color:var(--cyan)}
[data-theme=dark] .cbadge.done{background:rgba(184,240,0,.15);color:var(--acc)}
[data-theme=dark] .cbadge.error{background:rgba(255,58,88,.15);color:var(--red)}
@keyframes spin{to{transform:rotate(360deg)}}

/* ──────── OVERLAYS ──────── */
.ovl{position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(8px);z-index:500;display:none;align-items:center;justify-content:center;padding:16px}
[data-theme=dark] .ovl{background:rgba(7,7,14,.88)}
.ovl.on{display:flex}
.modal{background:var(--bg2);border:1px solid var(--bdr);border-radius:13px;padding:20px;max-width:700px;width:100%;max-height:92vh;overflow-y:auto;box-shadow:var(--sh2)}
.modal-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.modal-ttl{font-family:'DM Mono',monospace;font-size:11px;color:var(--mut);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:86%}
.modal-x{background:none;border:none;color:var(--mut);font-size:18px;cursor:pointer;flex-shrink:0;line-height:1}
.modal-x:hover{color:var(--txt)}
.prev-pair{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.plbl{font-family:'DM Mono',monospace;font-size:9px;color:var(--mut);text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px}
.pbox{border-radius:7px;overflow:hidden;border:1px solid var(--bdr);background:repeating-conic-gradient(var(--bg3) 0% 25%,var(--bg2) 0% 50%) 0 0/12px 12px}
.pbox img{width:100%;display:block}

/* crop modal */
.crop-wrap{border-radius:8px;overflow:hidden;border:1px solid var(--bdr);background:repeating-conic-gradient(var(--bg3) 0% 25%,var(--bg2) 0% 50%) 0 0/12px 12px;display:flex;align-items:center;justify-content:center;max-height:360px}
#cpCanvas{max-width:100%;max-height:350px;display:block}
.crop-modes{display:flex;gap:5px;margin-top:10px}
.cm-btn{flex:1;padding:8px;border:1px solid var(--bdr);border-radius:6px;background:transparent;color:var(--mut);font-size:11.5px;font-weight:600;cursor:pointer;transition:all .12s;font-family:'DM Sans',sans-serif}
.cm-btn.on{border-color:var(--acc);background:var(--acc-a);color:var(--acc)}
.crop-acts{display:flex;gap:8px;margin-top:10px}
.btnca,.btncd{flex:1;padding:11px;border:none;border-radius:7px;font-size:13px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .13s}
.btnca{background:var(--acc);color:var(--acc-t)}.btnca:hover{background:var(--acc2)}
.btncd{background:var(--cyan);color:#fff}.btncd:hover{opacity:.86}

/* toast */
.toast{position:fixed;bottom:24px;right:24px;background:var(--bg2);border:1px solid var(--bdr);border-radius:9px;padding:10px 16px;font-size:12px;box-shadow:var(--sh2);z-index:8000;opacity:0;transform:translateY(8px);transition:all .22s;pointer-events:none}
.toast.on{opacity:1;transform:translateY(0)}
.toast.ok{border-color:var(--acc);color:var(--acc)}
.toast.er{border-color:var(--red);color:var(--red)}

::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:3px}
</style>
</head>
<body data-theme="light">

<div id="gDrop"><div class="gd-box"><div class="gd-ico">📂</div><div class="gd-txt" id="gdTxt">放開以加入圖片</div></div></div>
<div class="toast" id="toast"></div>

<div class="app">
<!-- ══════════ SIDEBAR ══════════ -->
<div class="sb">
  <div class="sb-brand">
    <div class="sb-title" id="sbTitle">單色背景<em>大量去背</em>工具</div>
    <div class="sb-author" id="sbAuthor">作者：闕雪 ｜ 本地端處理</div>
  </div>

  <div class="sb-panels">

    <!-- 去背模式 -->
    <div class="pnl">
      <div class="pnl-hd o" onclick="tp(this)"><span class="pnl-ttl">🎯 <span data-i="mT">去背模式</span></span><span class="pnl-arr">▼</span></div>
      <div class="pnl-bd o">
        <div class="m-list">
          <button class="mc" onclick="setM('white',this)"><span class="mc-ico">⬜</span><div><div class="mc-name" data-i="mW">白色背景</div><div class="mc-desc">White BG</div></div></button>
          <button class="mc on" onclick="setM('green',this)"><span class="mc-ico">🟩</span><div><div class="mc-name" data-i="mG">綠幕 Chroma</div><div class="mc-desc">Green Screen</div></div></button>
        </div>
        <button class="more-btn" id="moreBtn" onclick="tMore()">▸ <span data-i="mMore">更多模式…</span></button>
        <div class="xtra" id="xtra">
          <button class="mc" onclick="setM('blue',this)"><span class="mc-ico">🟦</span><div><div class="mc-name" data-i="mB">藍幕</div><div class="mc-desc">Blue Screen</div></div></button>
          <button class="mc" onclick="setM('both',this)"><span class="mc-ico">✦</span><div><div class="mc-name" data-i="mBo">白底＋綠幕</div><div class="mc-desc">Both</div></div></button>
          <button class="mc" onclick="setM('custom',this)"><span class="mc-ico">🎨</span><div><div class="mc-name" data-i="mC">自訂顏色</div><div class="mc-desc">Custom Color</div></div></button>
          <button class="mc" onclick="setM('complex',this)"><span class="mc-ico">🌄</span><div><div class="mc-name" data-i="mX">複雜背景</div><div class="mc-desc">Edge Detection</div></div></button>
        </div>
        <div class="cc-row" id="ccRow">
          <label data-i="pickC">選色</label>
          <input type="color" id="cpick" value="#ff0000" oninput="sHex(this.value)">

// ════════════ COLOUR MATCH ════════════
function isBg(r,g,b,tol){
  if(mode==='white'||mode==='both'){const br=(r+g+b)/3,mx=Math.max(r,g,b),sat=mx===0?0:(mx-Math.min(r,g,b))/mx*255;if(br>=255-tol&&sat<=tol*.65)return true;}
  if(mode==='green'||mode==='both'){if(g-Math.max(r,b)>42-tol*.28&&g>50&&r<215&&b<215)return true;}
  if(mode==='blue'){if(b-Math.max(r,g)>42-tol*.28&&b>50&&r<215&&g<215)return true;}
  if(mode==='custom'){const c=gCustomRGB();if(Math.abs(r-c.r)<=tol&&Math.abs(g-c.g)<=tol&&Math.abs(b-c.b)<=tol)return true;}
  return false;
}
function gSim(r,g,b,tol){
  let s=0;
  if(mode==='white'||mode==='both'){const br=(r+g+b)/3,mx=Math.max(r,g,b),sat=mx===0?0:(mx-Math.min(r,g,b))/mx*255;s=Math.max(s,Math.min(1,Math.max(0,br-(255-tol*2.2))/(tol*2.2)*Math.max(0,tol*.65-sat)/(tol*.65)*1.6));}
  if(mode==='green'||mode==='both')s=Math.max(s,Math.min(1,Math.max(0,(g-Math.max(r,b))-(42-tol*.55))/(tol*.55)));
  if(mode==='blue')s=Math.max(s,Math.min(1,Math.max(0,(b-Math.max(r,g))-(42-tol*.55))/(tol*.55)));
  if(mode==='custom'){const c=gCustomRGB();s=Math.max(s,Math.max(0,1-Math.sqrt((r-c.r)**2+(g-c.g)**2+(b-c.b)**2)/(tol*1.5)));}
  return s;
}
function complexMask(d,W,H,tol){
  const grey=new Float32Array(W*H);
  for(let i=0;i<d.length;i+=4)grey[i>>2]=(d[i]*.299+d[i+1]*.587+d[i+2]*.114)/255;
  const edge=new Float32Array(W*H);
  for(let y=1;y<H-1;y++)for(let x=1;x<W-1;x++){const p=y*W+x;const gx=-grey[(y-1)*W+x-1]-2*grey[y*W+x-1]-grey[(y+1)*W+x-1]+grey[(y-1)*W+x+1]+2*grey[y*W+x+1]+grey[(y+1)*W+x+1];const gy=-grey[(y-1)*W+x-1]-2*grey[(y-1)*W+x]-grey[(y-1)*W+x+1]+grey[(y+1)*W+x-1]+2*grey[(y+1)*W+x]+grey[(y+1)*W+x+1];edge[p]=Math.sqrt(gx*gx+gy*gy);}
  const thr=(tol/130)*.55+.07,isFg=new Uint8Array(W*H);for(let p=0;p<W*H;p++)if(edge[p]>thr)isFg[p]=1;
  const vis=new Uint8Array(W*H),stk=new Int32Array(W*H);let top=0;
  function seed(p){if(!isFg[p]&&!vis[p]){vis[p]=1;stk[top++]=p;}}
  for(let x=0;x<W;x++){seed(x);seed((H-1)*W+x);}
  for(let y=0;y<H;y++){seed(y*W);seed(y*W+W-1);}
  while(top>0){const p=stk[--top],x=p%W,y=(p/W)|0;if(x>0&&!isFg[p-1]&&!vis[p-1]){vis[p-1]=1;stk[top++]=p-1;}if(x<W-1&&!isFg[p+1]&&!vis[p+1]){vis[p+1]=1;stk[top++]=p+1;}if(y>0&&!isFg[p-W]&&!vis[p-W]){vis[p-W]=1;stk[top++]=p-W;}if(y<H-1&&!isFg[p+W]&&!vis[p+W]){vis[p+W]=1;stk[top++]=p+W;}}
  const rm=new Uint8Array(W*H);for(let p=0;p<W*H;p++)if(vis[p])rm[p]=1;return rm;
}

// ════════════ DEFRINGE ════════════
function defringe(d,W,H,remove,tol){
  // For each kept edge pixel, blend out the BG color contribution
  for(let y=0;y<H;y++)for(let x=0;x<W;x++){
    const p=y*W+x;if(remove[p])continue;
    const i=p*4;if(d[i+3]<240){
      // already semi-transparent - desaturate towards neutral
      // simple: if color is close to BG color, reduce saturation
      if(isBg(d[i],d[i+1],d[i+2],tol*0.5)){
        d[i+3]=Math.round(d[i+3]*0.6);
      }
    }
  }
}

// ════════════ COMPRESS PNG (using canvas re-encode) ════════════
// We use an offscreen canvas with quality hint — for PNG we run a simple
// pixel quantization pass to reduce unique colors → smaller file
function compressPNG(canvas, quality) {
  // quality 0..1: lower = more aggressive quantization
  // Strategy: reduce alpha to 1-bit for near-transparent pixels (helps PNG compression)
  const ctx = canvas.getContext('2d',{willReadFrequently:true});
  const id = ctx.getImageData(0,0,canvas.width,canvas.height);
  const d = id.data;
  const thresh = Math.round((1-quality)*128); // 0 at q=1, 128 at q=0
  for(let i=0;i<d.length;i+=4){
    if(d[i+3]<thresh) d[i+3]=0;  // snap near-transparent to full-transparent
    // Reduce color depth slightly for better LZ77 compression
    const step = Math.max(1, Math.round((1-quality)*8));
    if(step>1){
      d[i]  =Math.round(d[i]  /step)*step;
      d[i+1]=Math.round(d[i+1]/step)*step;
      d[i+2]=Math.round(d[i+2]/step)*step;
    }
  }
  ctx.putImageData(id,0,0);
  return canvas;
}

// ════════════ CORE: removeBg ════════════
async function removeBg(origUrl, item) {
  const tol    = parseInt(document.getElementById('slTol').value);
  const shrink = parseInt(document.getElementById('slShr').value);
  const feather= parseInt(document.getElementById('slFth').value);
  const doG    = document.getElementById('chkG').checked;
  const doH    = document.getElementById('chkH').checked;
  const doDf   = document.getElementById('chkDefringe').checked;
  const doCp   = document.getElementById('chkCp').checked;
  const qual   = parseInt(document.getElementById('slQ').value)/100;
  const padPx  = parseInt(document.getElementById('slPad').value);
  const doUni  = document.getElementById('chkUni').checked;
  const uniW   = parseInt(document.getElementById('uniW').value);
  const uniH   = parseInt(document.getElementById('uniH').value);

  return new Promise((res,rej)=>{
    const img=new Image();
    img.onload=()=>{
      const cv=document.getElementById('wc');cv.width=img.width;cv.height=img.height;
      const ctx=cv.getContext('2d',{willReadFrequently:true});ctx.drawImage(img,0,0);
      const W=cv.width,H=cv.height,N=W*H;
      const id=ctx.getImageData(0,0,W,H);const d=id.data;
      let rm;
      if(mode==='complex'){rm=complexMask(d,W,H,tol);}
      else{
        const bgMap=new Uint8Array(N);
        for(let i=0;i<d.length;i+=4)bgMap[i>>2]=isBg(d[i],d[i+1],d[i+2],tol)?1:0;
        const ob=new Uint8Array(N),stk=new Int32Array(N);let top=0;
        function seed(p){if(bgMap[p]&&!ob[p]){ob[p]=1;stk[top++]=p;}}
        for(let x=0;x<W;x++){seed(x);seed((H-1)*W+x);}
        for(let y=0;y<H;y++){seed(y*W);seed(y*W+W-1);}
        while(top>0){const p=stk[--top],x=p%W,y=(p/W)|0;if(x>0&&bgMap[p-1]&&!ob[p-1]){ob[p-1]=1;stk[top++]=p-1;}if(x<W-1&&bgMap[p+1]&&!ob[p+1]){ob[p+1]=1;stk[top++]=p+1;}if(y>0&&bgMap[p-W]&&!ob[p-W]){ob[p-W]=1;stk[top++]=p-W;}if(y<H-1&&bgMap[p+W]&&!ob[p+W]){ob[p+W]=1;stk[top++]=p+W;}}
        rm=new Uint8Array(N);
        for(let p=0;p<N;p++){if(ob[p]){rm[p]=1;continue;}if(doH&&bgMap[p])rm[p]=1;}
      }
      if(shrink>0){const cp=new Uint8Array(rm);for(let y=0;y<H;y++)for(let x=0;x<W;x++){const p=y*W+x;if(!cp[p]){let n=false;outer:for(let dy=-shrink;dy<=shrink;dy++)for(let dx=-shrink;dx<=shrink;dx++){const nx=x+dx,ny=y+dy;if(nx>=0&&nx<W&&ny>=0&&ny<H&&cp[ny*W+nx]){n=true;break outer;}}if(n)rm[p]=1;}}}
      // apply alpha
      for(let i=0;i<d.length;i+=4){
        const p=i>>2;if(rm[p]){d[i+3]=0;continue;}
        if(doG&&mode!=='complex'){const s=gSim(d[i],d[i+1],d[i+2],tol);if(s>0)d[i+3]=Math.round(d[i+3]*(1-s*.88));}
        if(feather>0&&d[i+3]>0){const x=p%W,y=(p/W)|0;let md=feather+1;for(let dy=-feather;dy<=feather;dy++)for(let dx=-feather;dx<=feather;dx++){const nx=x+dx,ny=y+dy;if(nx>=0&&nx<W&&ny>=0&&ny<H&&rm[ny*W+nx]){const dist=Math.sqrt(dx*dx+dy*dy);if(dist<md)md=dist;}}if(md<=feather)d[i+3]=Math.min(d[i+3],Math.round((md/feather)*255));}
      }
      if(doDf&&mode!=='complex')defringe(d,W,H,rm,tol);
      ctx.putImageData(id,0,0);
      let out=cv;
      if(cMode!=='none')out=cropCv(cv,cMode,cMode==='pad'?padPx:0);
      if(doUni)out=uniformCv(out,uniW,uniH);
      if(item){item.outW=out.width;item.outH=out.height;}

      // Determine original file type for compression
      const origType = item ? item.file.type : 'image/png';
      const isPNG = origType==='image/png'||origType==='image/gif';

      if(doCp){
        if(isPNG){
          // For PNG: quantize to reduce file size
          compressPNG(out, qual);
          out.toBlob(b=>{if(item)item.fileSize=b.size;res(b);},'image/png');
        } else {
          // For JPEG/WEBP: use quality parameter
          out.toBlob(b=>{if(item)item.fileSize=b.size;res(b);},origType,qual);
        }
      } else {
        out.toBlob(b=>{if(item)item.fileSize=b.size;res(b);},'image/png');
      }
    };
    img.onerror=rej;img.src=origUrl;
  });
}

// ════════════ CROP / UNIFORM ════════════
function cropCv(src,cm,pad){
  const W=src.width,H=src.height;
  const d=src.getContext('2d',{willReadFrequently:true}).getImageData(0,0,W,H).data;
  let x0=W,y0=H,x1=0,y1=0;
  for(let y=0;y<H;y++)for(let x=0;x<W;x++){if(d[(y*W+x)*4+3]>8){if(x<x0)x0=x;if(x>x1)x1=x;if(y<y0)y0=y;if(y>y1)y1=y;}}
  if(x1<=x0||y1<=y0)return src;
  const p=pad||0,ax=Math.max(0,x0-p),ay=Math.max(0,y0-p),bx=Math.min(W,x1+p+1),by=Math.min(H,y1+p+1);
  const out=document.getElementById('wc2');out.width=bx-ax;out.height=by-ay;
  const oc=out.getContext('2d');oc.clearRect(0,0,out.width,out.height);oc.drawImage(src,ax,ay,out.width,out.height,0,0,out.width,out.height);return out;
}
function uniformCv(src,uw,uh){
  const out=document.getElementById('wc2');out.width=uw;out.height=uh;
  const oc=out.getContext('2d');oc.clearRect(0,0,uw,uh);
  const sc=Math.min(uw/src.width,uh/src.height,1),dw=src.width*sc,dh=src.height*sc;
  oc.drawImage(src,(uw-dw)/2,(uh-dh)/2,dw,dh);return out;
}

// ════════════ RETRY ════════════
async function retryOne(i){
  if(busy)return;busy=true;
  items[i].status='processing';items[i].blob=null;
  render();setStat(T.retrying+': '+items[i].file.name);
  try{items[i].blob=await removeBg(items[i].origUrl,items[i]);items[i].status='done';setStat('✓ '+T.retried+': '+items[i].file.name,'ok');}
  catch(e){items[i].status='error';setStat(T.failed,'er');console.error(e);}
  busy=false;render();
}

// ════════════ RUN ALL ════════════
async function runAll(force=false){
  if(busy||!items.length)return;busy=true;
  document.getElementById('btnGo').disabled=true;document.getElementById('btnRe').disabled=true;
  document.getElementById('progW').classList.add('on');
  const tgts=force?items.map((_,i)=>i):items.map((it,i)=>(it.status==='pending'||it.status==='error')?i:-1).filter(i=>i>=0);
  let ok=0,fail=0;
  for(let ti=0;ti<tgts.length;ti++){
    const i=tgts[ti];
    items[i].status='processing';items[i].blob=null;
    render();setStat(T.proc+' '+(ti+1)+'/'+tgts.length+': '+items[i].file.name);
    setProg((ti/tgts.length)*100);
    try{items[i].blob=await removeBg(items[i].origUrl,items[i]);items[i].status='done';ok++;}
    catch(e){items[i].status='error';fail++;console.error(e);}
    setProg(((ti+1)/tgts.length)*100);render();await tick();
  }
  busy=false;
  setStat(fail?`${T.allD}: ${ok} ✓  ${fail} ${T.smFail}`:`✓ ${T.allD}，${ok} ${T.zhn}`,fail?'er':'ok');
  showToast(fail?`${ok} ✓  ${fail} ✗`:`✓ ${ok} ${T.zhn}`,fail?'er':'ok');
  render();
}

// ════════════ DOWNLOAD ════════════
function getExt(it){
  if(document.getElementById('chkCp').checked){
    const t=it.file.type;
    if(t==='image/jpeg')return'.jpg';
    if(t==='image/webp')return'.webp';
  }
  return'.png';
}
function dlOne(it){
  const url=URL.createObjectURL(it.blob);const a=document.createElement('a');
  a.href=url;a.download=it.file.name.replace(/\.[^.]+$/,'')+getExt(it);a.click();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}
async function dlAll(){
  const done=items.filter(it=>it.blob);
  if(!done.length){showToast(T.failed,'er');return;}
  if(done.length===1){dlOne(done[0]);return;}
  try{
    await ldScript('https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js');
    const zip=new JSZip();
    done.forEach(it=>zip.file(it.file.name.replace(/\.[^.]+$/,'')+getExt(it),it.blob));
    const zb=await zip.generateAsync({type:'blob'});
    const url=URL.createObjectURL(zb);const a=document.createElement('a');a.href=url;a.download='batchcut_results.zip';a.click();
    setTimeout(()=>URL.revokeObjectURL(url),2000);
    showToast(`✓ ZIP (${done.length} ${T.zhn})`,'ok');
  }catch{for(const it of done){dlOne(it);await new Promise(r=>setTimeout(r,360));}}
}
function ldScript(src){return new Promise((res,rej)=>{if(document.querySelector(`script[src="${src}"]`)){res();return;}const s=document.createElement('script');s.src=src;s.onload=res;s.onerror=rej;document.head.appendChild(s);});}

function setCPrev(m,el){cPrevMode=m;document.querySelectorAll('.cm-btn').forEach(b=>b.classList.remove('on'));el.classList.add('on');renderCropPrev();}
function renderCropPrev(){
  const it=items[cropIdx];if(!it?.blob)return;
  const padPx=parseInt(document.getElementById('slPad').value);
  const img=new Image();
  img.onload=()=>{
    const src=document.getElementById('wc');src.width=img.width;src.height=img.height;
    src.getContext('2d',{willReadFrequently:true}).drawImage(img,0,0);
    const cr=cropCv(src,cPrevMode,cPrevMode==='pad'?padPx:0);
    const out=document.getElementById('cpCanvas');out.width=cr.width;out.height=cr.height;
    out.getContext('2d').drawImage(cr,0,0);
  };
  img.src=URL.createObjectURL(it.blob);
}
function applyCrop(){
  const it=items[cropIdx];if(!it)return;
  const padPx=parseInt(document.getElementById('slPad').value);
  const img=new Image();
  img.onload=()=>{
    const src=document.getElementById('wc');src.width=img.width;src.height=img.height;
    src.getContext('2d',{willReadFrequently:true}).drawImage(img,0,0);
    const cr=cropCv(src,cPrevMode,cPrevMode==='pad'?padPx:0);
    cr.toBlob(b=>{it.blob=b;it.outW=cr.width;it.outH=cr.height;it.fileSize=b.size;render();cCrop();showToast('✓ '+it.file.name,'ok');},'image/png');
  };
  img.src=URL.createObjectURL(it.blob);
}
function cropDl(){
  const it=items[cropIdx];if(!it)return;
  const padPx=parseInt(document.getElementById('slPad').value);
  const img=new Image();
  img.onload=()=>{
    const src=document.getElementById('wc');src.width=img.width;src.height=img.height;
    src.getContext('2d',{willReadFrequently:true}).drawImage(img,0,0);
    cropCv(src,cPrevMode,cPrevMode==='pad'?padPx:0).toBlob(b=>{
      const url=URL.createObjectURL(b);const a=document.createElement('a');
      a.href=url;a.download=it.file.name.replace(/\.[^.]+$/,'')+`_crop.png`;a.click();
      setTimeout(()=>URL.revokeObjectURL(url),1000);
    },'image/png');
  };
  img.src=URL.createObjectURL(it.blob);
}
function cCrop(e){if(!e||e.target===document.getElementById('cropOvl'))document.getElementById('cropOvl').classList.remove('on');}

// ════════════ CLEAR ════════════
function clearAll(){items=[];document.getElementById('progW').classList.remove('on');setStat('');setProg(0);render();}

// ════════════ HELPERS ════════════
function setStat(msg,cls=''){const el=document.getElementById('statBar');el.className='stat-bar'+(cls?' '+cls:'');el.innerHTML=msg?`<div class="stat-dot"></div>${msg}`:'';}

function setProg(p){document.getElementById('progF').style.width=p+'%';}
function tick(){return new Promise(r=>setTimeout(r,8));}
let toastTimer;
function showToast(msg,cls=''){
  const t=document.getElementById('toast');t.textContent=msg;t.className='toast on '+(cls||'');
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>{t.className='toast';},3000);
}
// init
setLang('zh-TW');
</script>
